name: Security Gates 🛡️

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Workflow
        run: echo "Validation successful"

  security-gates:
    uses: Trendyol/security-actions/.github/workflows/security-gates.yml@995aa3dd2f2f8f0e9cbdb52bc6638c1373d6a1e0
    permissions:
      actions: read
      contents: read
      security-events: write
    secrets: inherit
