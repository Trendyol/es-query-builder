<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Convert Elasticsearch JSON queries to Go code for the es-query-builder library.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/solarized.min.css" rel="stylesheet">
  <link href="style/style.css" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
            <g transform="translate(200, 200)">
              <polygon points="0,0 -129.904,-75 0,-150" fill="#85CDCF" stroke="#85CDCF" stroke-width="0.5" stroke-linejoin="round" />
              <polygon points="0,0 0,-150 129.904,-75" fill="#6CBFC3" stroke="#6CBFC3" stroke-width="0.5" stroke-linejoin="round" />
              <polygon points="0,0 129.904,-75 129.904,75" fill="#309FA4" stroke="#309FA4" stroke-width="0.5" stroke-linejoin="round" />
              <polygon points="0,0 129.904,75 0,150" fill="#73C4C7" stroke="#73C4C7" stroke-width="0.5" stroke-linejoin="round" />
              <polygon points="0,0 0,150 -129.904,75" fill="#2D9FA5" stroke="#2D9FA5" stroke-width="0.5" stroke-linejoin="round" />
              <polygon points="0,0 -129.904,75 -129.904,-75" fill="#7AC8C9" stroke="#7AC8C9" stroke-width="0.5" stroke-linejoin="round" />
            </g>
          </svg>
        </span>
        <div class="brand-text">
          <h1>Query → Go</h1>
          <p class="brand-sub">Elasticsearch JSON to es-query-builder</p>
        </div>
      </div>
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle color theme" title="Toggle theme">
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
        </svg>
      </button>
    </header>

    <main class="workspace">
      <section class="panel" aria-labelledby="input-panel-label">
        <div class="panel-bar">
          <div class="panel-identity">
            <span id="input-panel-label" class="panel-label">Input</span>
            <span class="panel-chip">JSON</span>
          </div>
          <div class="panel-actions">
            <button id="formatBtn" class="btn btn-ghost" type="button">Format</button>
            <button id="parseBtn" class="btn btn-primary" type="button">Convert to Go</button>
          </div>
        </div>
        <div class="editor-wrapper">
          <textarea id="esQuery" aria-label="Elasticsearch JSON query"></textarea>
        </div>
        <div id="inputError" class="error" role="alert" aria-live="polite"></div>
      </section>

      <section class="panel" aria-labelledby="output-panel-label">
        <div class="panel-bar">
          <div class="panel-identity">
            <span id="output-panel-label" class="panel-label">Output</span>
            <span class="panel-chip">Go</span>
          </div>
          <div class="panel-actions">
            <button id="copyBtn" class="btn btn-ghost" type="button">
              <span class="btn-idle">
                <svg class="btn-icon" viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                Copy
              </span>
              <span class="btn-done">
                <svg class="btn-icon" viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                Copied
              </span>
            </button>
          </div>
        </div>
        <div class="editor-wrapper">
          <textarea id="goCode" aria-label="Generated Go code"></textarea>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <a href="https://github.com/GokselKUCUKSAHIN" target="_blank" rel="noopener noreferrer" class="github-link">
        <svg class="github-icon" viewBox="0 0 24 24" width="15" height="15" aria-hidden="true">
          <path fill="currentColor" d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12"></path>
        </svg>
        @GokselKUCUKSAHIN
      </a>
      <span class="footer-sep" aria-hidden="true">·</span>
      <span class="footer-note">Trendyol es-query-builder</span>
    </footer>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/go/go.min.js"></script>
<script src="script/index.js"></script>
<script>
  const parser = new ESQueryParser();

  const themeToggle = document.getElementById('themeToggle');
  const html = document.documentElement;

  themeToggle.addEventListener('click', () => {
    const currentTheme = html.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    updateEditorThemes(newTheme);
  });

  const savedTheme = localStorage.getItem('theme') || 'dark';
  html.setAttribute('data-theme', savedTheme);

  const esEditor = CodeMirror.fromTextArea(document.getElementById('esQuery'), {
    mode: 'javascript',
    theme: savedTheme === 'dark' ? 'monokai' : 'solarized light',
    lineNumbers: true,
    matchBrackets: true,
    autoCloseBrackets: true,
    tabSize: 2,
    indentWithTabs: true,
    extraKeys: {"Ctrl-Q": function(cm){ cm.foldCode(cm.getCursor()); }},
    foldGutter: true,
    gutters: ["CodeMirror-linenumbers", "CodeMirror-foldgutter"],
    lint: true
  });

  const goEditor = CodeMirror.fromTextArea(document.getElementById('goCode'), {
    mode: 'go',
    theme: savedTheme === 'dark' ? 'monokai' : 'solarized light',
    lineNumbers: true,
    readOnly: true,
    tabSize: 4,
    indentWithTabs: true
  });

  function updateEditorThemes(theme) {
    const editorTheme = theme === 'dark' ? 'monokai' : 'solarized light';
    esEditor.setOption('theme', editorTheme);
    goEditor.setOption('theme', editorTheme);
  }

  document.getElementById('parseBtn').addEventListener('click', () => {
    try {
      const query = JSON.parse(esEditor.getValue());
      const code = parser.parse(query);
      goEditor.setValue(code);
      goEditor.refresh();
      document.getElementById('inputError').textContent = '';
    } catch (e) {
      document.getElementById('inputError').textContent = e.message;
    }
  });

  document.getElementById('formatBtn').addEventListener('click', () => {
    try {
      const query = JSON.parse(esEditor.getValue());
      esEditor.setValue(JSON.stringify(query, null, 2));
      document.getElementById('inputError').textContent = '';
    } catch (e) {
      document.getElementById('inputError').textContent = 'Invalid JSON';
    }
  });

  document.getElementById('copyBtn').addEventListener('click', () => {
    const copyBtn = document.getElementById('copyBtn');
    navigator.clipboard.writeText(goEditor.getValue())
      .then(() => {
        copyBtn.classList.add('copied');
        setTimeout(() => copyBtn.classList.remove('copied'), 1800);
      })
      .catch(err => console.error('Failed to copy:', err));
  });
</script>
</body>
</html>
